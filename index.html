<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corporate Tax Estimation &amp; Penalty Calculator</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // Force the classic JSX runtime (React.createElement) so the inline
    // text/babel script runs in a plain, non-module <script> without
    // Babel injecting `import ... from "react/jsx-runtime"`.
    Babel.registerPreset("react-classic", {
      presets: [[Babel.availablePresets["react"], { runtime: "classic" }]],
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    /* Hide number-input spinners just in case */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* Print / Save-as-PDF styling */
    @media print {
      body { background: #fff; }
      .no-print { display: none !important; }
      /* Keep the coloured cards and red penalty visible in the PDF */
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel" data-presets="react-classic">
    const { useState, useMemo } = React;

    // ---------- Helpers ----------
    const RM = (n) => {
      if (n === null || n === undefined || isNaN(n)) n = 0;
      return "RM " + Number(n).toLocaleString("en-MY", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });
    };

    const pct = (r) => (r * 100).toFixed(0) + "%";

    // SME progressive tiers
    const TIERS = [
      { label: "First RM 150,000", from: 0, upTo: 150000, rate: 0.15 },
      { label: "RM 150,001 to RM 600,000", from: 150000, upTo: 600000, rate: 0.17 },
      { label: "RM 600,001 and subsequent balance", from: 600000, upTo: Infinity, rate: 0.24 },
    ];

    // Compute tax + per-tier breakdown
    function computeTax(income, isNonSME) {
      income = Math.max(0, Number(income) || 0);

      if (isNonSME) {
        const tax = income * 0.24;
        return {
          tax,
          breakdown: [
            { label: "All taxable income @ 24%", amount: income, rate: 0.24, tax },
          ],
        };
      }

      let tax = 0;
      const breakdown = [];
      for (const t of TIERS) {
        if (income <= t.from) break;
        const amountInTier = Math.min(income, t.upTo) - t.from;
        const tierTax = amountInTier * t.rate;
        tax += tierTax;
        breakdown.push({
          label: `${t.label} @ ${pct(t.rate)}`,
          amount: amountInTier,
          rate: t.rate,
          tax: tierTax,
        });
      }
      return { tax, breakdown };
    }

    // Top marginal rate the SME client reached (based on actual taxable income)
    function topMarginalRate(income, isNonSME) {
      if (isNonSME) return 0.24;
      income = Math.max(0, Number(income) || 0);
      if (income > 600000) return 0.24;
      if (income > 150000) return 0.17;
      return 0.15;
    }

    // SME tax payable at the tier boundaries (used to invert tax -> income)
    const TAX_AT_150K = 150000 * 0.15;               // 22,500
    const TAX_AT_600K = TAX_AT_150K + 450000 * 0.17; // 99,000

    // Reverse-engineer the taxable income that produces a given tax payable.
    function impliedIncome(tax, isNonSME) {
      tax = Math.max(0, Number(tax) || 0);
      if (isNonSME) return tax / 0.24;
      if (tax <= TAX_AT_150K) return tax / 0.15;
      if (tax <= TAX_AT_600K) return 150000 + (tax - TAX_AT_150K) / 0.17;
      return 600000 + (tax - TAX_AT_600K) / 0.24;
    }

    // ---------- Sub-components ----------
    function MoneyInput({ label, value, onChange, hint }) {
      const display = value === "" ? "" : Number(value).toLocaleString("en-MY");
      return (
        <div>
          <label className="block text-sm font-semibold text-slate-700 mb-1">{label}</label>
          <div className="relative">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium pointer-events-none">RM</span>
            <input
              type="text"
              inputMode="numeric"
              value={display}
              onChange={(e) => {
                const raw = e.target.value.replace(/[^0-9.]/g, "");
                // keep only first decimal point
                const parts = raw.split(".");
                const cleaned = parts.length > 1 ? parts[0] + "." + parts.slice(1).join("") : raw;
                onChange(cleaned === "" ? "" : cleaned);
              }}
              placeholder="0"
              className="w-full pl-11 pr-3 py-2.5 rounded-lg border border-slate-300 bg-white text-right text-lg font-semibold text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          {hint && <p className="text-xs text-slate-400 mt-1">{hint}</p>}
        </div>
      );
    }

    function StatCard({ label, value, sub, tone = "slate" }) {
      const tones = {
        slate: "bg-white border-slate-200",
        indigo: "bg-indigo-50 border-indigo-200",
        amber: "bg-amber-50 border-amber-200",
        green: "bg-emerald-50 border-emerald-200",
      };
      return (
        <div className={`rounded-xl border p-4 ${tones[tone]}`}>
          <p className="text-xs uppercase tracking-wide text-slate-500 font-medium">{label}</p>
          <p className="text-xl font-bold text-slate-800 mt-1">{value}</p>
          {sub && <p className="text-xs text-slate-500 mt-1">{sub}</p>}
        </div>
      );
    }

    function Row({ label, value, strong, indent }) {
      return (
        <div className={`flex items-center justify-between py-2 ${indent ? "pl-4" : ""}`}>
          <span className={`text-sm ${strong ? "font-semibold text-slate-800" : "text-slate-600"}`}>{label}</span>
          <span className={`text-sm tabular-nums ${strong ? "font-bold text-slate-900" : "text-slate-700"}`}>{value}</span>
        </div>
      );
    }

    function BreakdownTable({ title, income, result }) {
      return (
        <div className="rounded-xl border border-slate-200 bg-white overflow-hidden">
          <div className="px-4 py-2.5 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
            <h4 className="text-sm font-semibold text-slate-700">{title}</h4>
            <span className="text-xs text-slate-500">Implied taxable income: {RM(income)}</span>
          </div>
          <table className="w-full text-sm">
            <thead>
              <tr className="text-xs text-slate-400 uppercase tracking-wide">
                <th className="text-left font-medium px-4 py-2">Band</th>
                <th className="text-right font-medium px-4 py-2">Amount</th>
                <th className="text-right font-medium px-4 py-2">Rate</th>
                <th className="text-right font-medium px-4 py-2">Tax</th>
              </tr>
            </thead>
            <tbody>
              {result.breakdown.length === 0 && (
                <tr><td colSpan="4" className="px-4 py-3 text-slate-400 text-center">No taxable income entered.</td></tr>
              )}
              {result.breakdown.map((b, i) => (
                <tr key={i} className="border-t border-slate-100">
                  <td className="px-4 py-2 text-slate-600">{b.label}</td>
                  <td className="px-4 py-2 text-right tabular-nums text-slate-700">{RM(b.amount)}</td>
                  <td className="px-4 py-2 text-right text-slate-500">{pct(b.rate)}</td>
                  <td className="px-4 py-2 text-right tabular-nums font-medium text-slate-800">{RM(b.tax)}</td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr className="border-t-2 border-slate-200 bg-slate-50">
                <td className="px-4 py-2 font-semibold text-slate-700" colSpan="3">Total Tax Payable</td>
                <td className="px-4 py-2 text-right font-bold tabular-nums text-slate-900">{RM(result.tax)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      );
    }

    // ---------- Main App ----------
    function App() {
      const [isNonSME, setIsNonSME] = useState(false);
      const [etInput, setEtInput] = useState(""); // Estimated Tax Payable
      const [atInput, setAtInput] = useState(""); // Actual Tax Payable

      const ET = Math.max(0, Number(etInput) || 0);
      const AT = Math.max(0, Number(atInput) || 0);

      // Reverse-engineer the taxable income implied by each tax payable, so we
      // can still show the tier breakdown and the max-income figures.
      const estIncome = useMemo(() => impliedIncome(ET, isNonSME), [ET, isNonSME]);
      const actIncome = useMemo(() => impliedIncome(AT, isNonSME), [AT, isNonSME]);
      const est = useMemo(() => computeTax(estIncome, isNonSME), [estIncome, isNonSME]);
      const act = useMemo(() => computeTax(actIncome, isNonSME), [actIncome, isNonSME]);

      const maxSafeAT = ET / 0.7; // AT above this triggers the 30% shortfall rule
      const shortfall = AT - ET;
      const marginBuffer = 0.3 * AT;
      const amountSubjectToIncrease = Math.max(0, shortfall - marginBuffer);
      const penalty = amountSubjectToIncrease * 0.1;

      // Highest actual taxable income the client could report without triggering
      // the penalty = the income whose tax equals the safe ceiling (ET ÷ 0.7).
      const maxSafeIncome = impliedIncome(maxSafeAT, isNonSME);

      // How much taxable income must be reduced to get back into the safe zone.
      const incomeToReduce = Math.max(0, actIncome - maxSafeIncome);

      const penaltyTriggered = penalty > 0;
      const isOverSafe = AT > maxSafeAT + 0.005;

      return (
        <div className="max-w-5xl mx-auto px-4 py-8">
          {/* Header */}
          <div className="mb-6 flex items-start justify-between gap-4">
            <div>
              <h1 className="text-2xl font-bold text-slate-900">Corporate Tax Estimation &amp; Penalty Calculator</h1>
              <p className="text-slate-500 mt-1">
                Malaysia · Section 107C(10) under-estimation penalty (10% on the shortfall beyond the 30% margin)
              </p>
            </div>
            <button
              type="button"
              onClick={() => window.print()}
              className="no-print shrink-0 inline-flex items-center gap-2 rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" className="h-4 w-4">
                <path fillRule="evenodd" d="M10 3a.75.75 0 0 1 .75.75v6.638l1.96-2.158a.75.75 0 1 1 1.08 1.04l-3.25 3.5a.75.75 0 0 1-1.08 0l-3.25-3.5a.75.75 0 1 1 1.08-1.04l1.96 2.158V3.75A.75.75 0 0 1 10 3Z" clipRule="evenodd" />
                <path d="M3.5 13a.75.75 0 0 1 .75.75v1.5c0 .414.336.75.75.75h10a.75.75 0 0 0 .75-.75v-1.5a.75.75 0 0 1 1.5 0v1.5A2.25 2.25 0 0 1 15 17.5H5A2.25 2.25 0 0 1 2.75 15.25v-1.5A.75.75 0 0 1 3.5 13Z" />
              </svg>
              Save as PDF
            </button>
          </div>

          <div className="grid md:grid-cols-5 gap-6">
            {/* ---- Inputs column ---- */}
            <div className="md:col-span-2 space-y-5">
              <div className="rounded-xl border border-slate-200 bg-white p-5 space-y-5">
                <h3 className="text-sm font-semibold text-slate-700 uppercase tracking-wide">Inputs</h3>

                {/* Toggle */}
                <label className="flex items-start gap-3 cursor-pointer select-none">
                  <input
                    type="checkbox"
                    checked={isNonSME}
                    onChange={(e) => setIsNonSME(e.target.checked)}
                    className="mt-0.5 h-5 w-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500"
                  />
                  <span>
                    <span className="block text-sm font-semibold text-slate-800">Non-SME Company (Flat 24%)</span>
                    <span className="block text-xs text-slate-500">
                      {isNonSME
                        ? "Flat 24% applied to all taxable income."
                        : "SME progressive rates applied (15% / 17% / 24%)."}
                    </span>
                  </span>
                </label>

                <MoneyInput
                  label="Estimated Tax Payable (ET)"
                  value={etInput}
                  onChange={setEtInput}
                  hint="Tax on the estimate (CP204 / revised estimate) submitted."
                />
                <MoneyInput
                  label="Actual Tax Payable (AT)"
                  value={atInput}
                  onChange={setAtInput}
                  hint="Final tax payable per the return."
                />
              </div>

              {/* Rate reference */}
              <div className="rounded-xl border border-slate-200 bg-white p-5">
                <h3 className="text-sm font-semibold text-slate-700 uppercase tracking-wide mb-3">Tax Rates in Use</h3>
                {isNonSME ? (
                  <p className="text-sm text-slate-600">Flat <span className="font-semibold">24%</span> on all chargeable income.</p>
                ) : (
                  <ul className="text-sm text-slate-600 space-y-1.5">
                    <li className="flex justify-between"><span>First RM 150,000</span><span className="font-semibold">15%</span></li>
                    <li className="flex justify-between"><span>RM 150,001 – 600,000</span><span className="font-semibold">17%</span></li>
                    <li className="flex justify-between"><span>RM 600,001 and above</span><span className="font-semibold">24%</span></li>
                  </ul>
                )}
                <p className="text-[11px] text-slate-400 mt-3 leading-relaxed">
                  SME = paid-up capital ≤ RM2.5m and gross business income ≤ RM50m.
                </p>
              </div>
            </div>

            {/* ---- Results column ---- */}
            <div className="md:col-span-3 space-y-6">
              {/* Key stats */}
              <div className="grid grid-cols-2 gap-4">
                <StatCard
                  label="Implied Estimated Taxable Income"
                  value={RM(estIncome)}
                  sub="Back-calculated from ET"
                  tone="indigo"
                />
                <StatCard
                  label="Implied Actual Taxable Income"
                  value={RM(actIncome)}
                  sub="Back-calculated from AT"
                  tone="indigo"
                />
                <StatCard
                  label="Taxable Income to Reduce to Avoid Penalty"
                  value={RM(incomeToReduce)}
                  sub={isOverSafe
                    ? "Implied actual income − max income without penalty"
                    : "Already within the safe zone — no reduction needed"}
                  tone={isOverSafe ? "amber" : "green"}
                />
                <div className={`rounded-xl border p-4 ${isOverSafe ? "bg-amber-50 border-amber-200" : "bg-emerald-50 border-emerald-200"}`}>
                  <p className="text-xs uppercase tracking-wide text-slate-500 font-medium">Maximum Without Penalty</p>
                  <div className="mt-2 space-y-2">
                    <div>
                      <p className="text-[11px] text-slate-500">Maximum Tax Payable (ET ÷ 0.7)</p>
                      <p className="text-lg font-bold text-slate-800">{RM(maxSafeAT)}</p>
                    </div>
                    <div>
                      <p className="text-[11px] text-slate-500">Maximum Taxable Income</p>
                      <p className="text-lg font-bold text-slate-800">{RM(maxSafeIncome)}</p>
                    </div>
                  </div>
                </div>
              </div>

              {/* Penalty breakdown */}
              <div className="rounded-xl border border-slate-200 bg-white p-5">
                <h3 className="text-sm font-semibold text-slate-700 uppercase tracking-wide mb-1">Penalty Computation</h3>
                <p className="text-xs text-slate-400 mb-3">
                  Amount to be increased = [ (AT − ET) − (30% × AT) ] × 10%
                </p>
                <div className="divide-y divide-slate-100">
                  <Row label="Shortfall (AT − ET)" value={RM(shortfall)} />
                  <Row label="30% Margin Buffer (30% × AT)" value={RM(marginBuffer)} />
                  <Row
                    label="Amount Subject to Increase (penalty base)"
                    value={RM(amountSubjectToIncrease)}
                    strong
                  />
                </div>

                {/* Penalty highlight */}
                <div
                  className={`mt-4 rounded-xl p-4 border ${
                    penaltyTriggered
                      ? "bg-red-50 border-red-300"
                      : "bg-emerald-50 border-emerald-200"
                  }`}
                >
                  <div className="flex items-center justify-between">
                    <span className={`text-sm font-semibold ${penaltyTriggered ? "text-red-700" : "text-emerald-700"}`}>
                      10% Penalty Amount
                    </span>
                    <span className={`text-2xl font-extrabold tabular-nums ${penaltyTriggered ? "text-red-600" : "text-emerald-600"}`}>
                      {RM(penalty)}
                    </span>
                  </div>
                  <p className={`text-xs mt-1 ${penaltyTriggered ? "text-red-600" : "text-emerald-600"}`}>
                    {penaltyTriggered
                      ? "Under-estimation penalty applies — the shortfall exceeds 30% of actual tax."
                      : "No penalty — the shortfall is within the 30% allowable margin."}
                  </p>
                </div>
              </div>

              {/* Tier breakdowns */}
              <div className="space-y-4">
                <BreakdownTable title="Estimated Tax — Implied Income & Tier Breakdown" income={Math.max(0, Number(estIncome) || 0)} result={est} />
                <BreakdownTable title="Actual Tax — Implied Income & Tier Breakdown" income={Math.max(0, Number(actIncome) || 0)} result={act} />
              </div>
            </div>
          </div>

          <p className="text-center text-xs text-slate-400 mt-8">
            For internal advisory use. Verify against the latest LHDN rates and rulings before filing.
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
